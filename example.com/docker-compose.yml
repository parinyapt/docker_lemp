version: '3'

services:

    nginx:
        container_name: '${PROJECT_NAME}_nginx'
        build: ./nginx/
        ports:
            - '${PROJECT_PORT}:80'
        links:
            - php
        environment:
            - VIRTUAL_HOST='${VIRTUAL_HOST_CONFIG}'

    php:
        container_name: '${PROJECT_NAME}_php'
        build: ./php/
        restart: unless-stopped
        expose:
            - 80
        volumes:
            - './public_html/:/var/www/html'
        depends_on:
            - db_server

    # Database
    db_server:
        container_name: '${PROJECT_NAME}_database'
        image: mysql:latest
        volumes:
            - '${VOLUME_DATABASE_NAME}:/var/lib/mysql'
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASS}'
            MYSQL_USER: '${MYSQL_USER}'
            MYSQL_PASSWORD: '${MYSQL_PASS}'
            MYSQL_DATABASE: '${MYSQL_DB}'
        networks:
            - '${NETWORK_NAME}'

    db_management:
        image: phpmyadmin:latest
        container_name: '${PROJECT_NAME}_database_management'
        ports:
            - '${DATABASE_MANAGEMENT_PORT}:80'
        environment:
            PMA_HOST: '${PROJECT_NAME}_database'
        links:
            - db_server
        volumes:
            - '${VOLUME_DATABASE_MANAGEMENT_NAME}:/var/www/html'
        networks:
            - '${NETWORK_NAME}'

networks:
    networks:
        default:
            external:
            name: nginx-proxy
    myweb_networks:
        driver: bridge

volumes:
    myweb_database_data:
    myweb_database_management_data: